<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <style>
    .box{fill:#ffffff;stroke:#c9c7c4;stroke-width:1.5;rx:8}
    .phase{fill:#efeafe;stroke:#6a5cc0;stroke-width:1.5}
    .amber{fill:#fbf0d9;stroke:#b07d18;stroke-width:1.5}
    .t{fill:#1c1a22;font-size:14px;font-weight:500}
    .s{fill:#5c5866;font-size:12px}
    .lbl{fill:#6a5cc0;font-size:12px;font-weight:500}
    .ar{stroke:#7c7888;stroke-width:1.6;fill:none;marker-end:url(#h)}
    @media (prefers-color-scheme: dark){
      .box{fill:#1b1b1f;stroke:#3a3a42}.phase{fill:#2a2450;stroke:#8a7de0}
      .amber{fill:#3a2f16;stroke:#c79a3a}.t{fill:#eceaf2}.s{fill:#a6a2b0}.lbl{fill:#a99cf0}
      .ar{stroke:#8a8698}
    }
  </style>
  <defs><marker id="h" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7c7888"/></marker></defs>

  <rect class="box" x="290" y="18" width="180" height="52" rx="8"/>
  <text class="t" x="380" y="40" text-anchor="middle">Gate</text>
  <text class="s" x="380" y="58" text-anchor="middle">no model call · pure · tested</text>
  <text class="s" x="486" y="46">every ~10 min</text>
  <path class="ar" d="M380 70 L380 96"/>
  <text class="lbl" x="392" y="88">fire? at most once per idle gap</text>

  <rect class="phase" x="40"  y="104" width="210" height="60" rx="8"/>
  <text class="t" x="145" y="128" text-anchor="middle">① Plan</text>
  <text class="s" x="145" y="148" text-anchor="middle">harvest → what's worth doing?</text>
  <rect class="phase" x="275" y="104" width="210" height="60" rx="8"/>
  <text class="t" x="380" y="128" text-anchor="middle">② Execute</text>
  <text class="s" x="380" y="148" text-anchor="middle">one session per task · real tools</text>
  <rect class="phase" x="510" y="104" width="210" height="60" rx="8"/>
  <text class="t" x="615" y="128" text-anchor="middle">③ Learn</text>
  <text class="s" x="615" y="148" text-anchor="middle">journal · grade · lessons</text>
  <path class="ar" d="M250 134 L273 134"/>
  <path class="ar" d="M485 134 L508 134"/>
  <path class="ar" d="M615 102 C615 84 200 84 160 102"/>
  <text class="lbl" x="400" y="80" text-anchor="middle">lessons feed the next cycle</text>

  <rect class="box" x="40" y="214" width="210" height="60" rx="8"/>
  <text class="t" x="145" y="238" text-anchor="middle">Harvest</text>
  <text class="s" x="145" y="258" text-anchor="middle">lessons · threads · your sources</text>
  <path class="ar" d="M145 212 L145 166"/>

  <rect class="amber" x="275" y="214" width="210" height="60" rx="8"/>
  <text class="t" x="380" y="238" text-anchor="middle">Inspector + Approval</text>
  <text class="s" x="380" y="258" text-anchor="middle">brake on every call · human yes</text>
  <path class="ar" d="M360 166 L360 212"/>
  <path class="ar" d="M400 212 L400 166"/>

  <rect class="box" x="510" y="214" width="210" height="60" rx="8"/>
  <text class="t" x="615" y="238" text-anchor="middle">Cycle outputs</text>
  <text class="s" x="615" y="258" text-anchor="middle">ledger · report · blast radius</text>
  <path class="ar" d="M615 166 L615 212"/>

  <rect class="box" x="40" y="330" width="680" height="52" rx="8"/>
  <text class="t" x="380" y="352" text-anchor="middle">Durable state — the continuity organ</text>
  <text class="s" x="380" y="370" text-anchor="middle">sqlite (cycles · ledger · threads · approvals · lessons) + MEMORY.md</text>
  <path class="ar" d="M145 274 L145 328"/>
  <path class="ar" d="M380 274 L380 328"/>
  <path class="ar" d="M615 274 L615 328"/>

  <text class="s" x="380" y="416" text-anchor="middle" font-style="italic">persistent mind · ephemeral compute · point it at any agent</text>
</svg>
